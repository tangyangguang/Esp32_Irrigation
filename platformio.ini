[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = platformio/espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = /Users/tyg/dir/claude_dir/Esp32Base/partitions/esp32-4mb-ota-balanced.csv
board_build.filesystem = littlefs
lib_deps =
  symlink:///Users/tyg/dir/claude_dir/Esp32Base
extra_scripts =
  post:/Users/tyg/dir/claude_dir/Esp32Base/scripts/esp32base_webota.py
custom_esp32base_webota_host = 192.168.2.141
custom_esp32base_webota_user = admin
custom_esp32base_webota_password = admin
build_flags =
  -D ESP32BASE_PROFILE=ESP32BASE_PROFILE_FULL
  -D ESP32BASE_DEFAULT_HOSTNAME=\"esp32-irrigation\"
  -D ESP32BASE_EB_FILELOG_PATH=\"/logs/irrigation.log\"
  -D ESP32BASE_ENABLE_APP_CONFIG=1
  -D ESP32BASE_ENABLE_APP_EVENTS=1
  -D ESP32BASE_APP_EVENT_LOG_CAPACITY=256
  -D ESP32BASE_APP_CONFIG_MAX_GROUPS=4
  -D ESP32BASE_APP_CONFIG_MAX_FIELDS=16
  -D ESP32BASE_WEB_MAX_ROUTES=32
  -D ESP32BASE_LOG_LEVEL=ESP32BASE_LOG_DEBUG
