[platformio]
default_envs = esp32_irrigation
extra_configs =
  platformio.local.ini

[size_flags]
build_flags =
  -fno-exceptions
  -flto

[env:esp32_irrigation]
platform = platformio/espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = ../../Esp32Base/partitions/esp32-4mb-ota-balanced.csv
build_unflags =
  -fno-lto
  -fuse-cxa-atexit
extra_scripts =
  post:../../Esp32Base/scripts/esp32base_webota.py
lib_deps =
  bblanchon/ArduinoJson@7.4.3
  ArduinoOTA
  DNSServer
  ESPmDNS
  LittleFS
  Update
  WebServer
  WiFi
  Wire
  symlink://../../Esp32Base
build_flags =
  ${size_flags.build_flags}
  -D ESP32BASE_PROFILE=ESP32BASE_PROFILE_FULL
  -D ESP32BASE_ENABLE_RECORD_STORE=1
  -D ESP32BASE_ENABLE_APP_EVENTS=1
  -D ESP32BASE_ENABLE_APP_EVENT_CONDITIONS=1
  -D ESP32BASE_ENABLE_APP_CONFIG=1
  -D ESP32BASE_APP_CONFIG_MAX_GROUPS=5
  ; IrrigationParameterConfig currently registers exactly 23 fields.
  -D ESP32BASE_APP_CONFIG_MAX_FIELDS=23
  -D ESP32BASE_ENABLE_RTC=1
  -D ESP32BASE_RTC_DRIVER=ESP32BASE_RTC_DRIVER_DS3231
  -D ESP32BASE_NTP_GMT_OFFSET_SEC=28800
  -D ESP32BASE_NTP_DAYLIGHT_OFFSET_SEC=0
  -D ESP32BASE_LOG_LEVEL=ESP32BASE_LOG_INFO
  -D ESP32BASE_EB_FILELOG_DEFAULT_MODE=ESP32BASE_FILELOG_MODE_WARN
  -D ESP32BASE_DEFAULT_HOSTNAME=\"irrigation-controller\"
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/ArduinoOTA/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/DNSServer/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/ESPmDNS/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/FS/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/Hash/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/LittleFS/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/Update/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/WebServer/src
  -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/WiFi/src

[env:native]
platform = native
test_framework = unity
test_build_src = yes
lib_deps =
  bblanchon/ArduinoJson@7.4.3
build_src_filter =
  -<*>
  +<irrigation/IrrigationConfig.cpp>
  +<irrigation/IrrigationConfigJson.cpp>
  +<irrigation/IrrigationTime.cpp>
  +<irrigation/FlowMonitor.cpp>
  +<irrigation/CalibrationStabilityDetector.cpp>
  +<irrigation/FlowCalibrationService.cpp>
  +<irrigation/WateringController.cpp>
  +<irrigation/WateringRecordCodec.cpp>
  +<irrigation/WateringScheduler.cpp>
  +<irrigation/UnexpectedFlowMonitor.cpp>
test_filter =
  test_config
  test_controller
  test_records
  test_scheduler
  test_unexpected_flow
  test_calibration
  test_time

[env:esp32_record_test]
platform = platformio/espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = ../../Esp32Base/partitions/esp32-4mb-ota-balanced.csv
test_framework = unity
test_build_src = yes
test_filter =
  test_record_store_device
lib_deps =
  LittleFS
  Wire
  symlink://../../Esp32Base
build_src_filter =
  -<*>
  +<irrigation/DeviceAliveCheckpoint.cpp>
  +<irrigation/IrrigationEvents.cpp>
  +<irrigation/WateringRecordCodec.cpp>
  +<irrigation/WateringRecordStore.cpp>
  +<irrigation/WateringScheduler.cpp>
  +<irrigation/WateringSchedulerStore.cpp>
build_flags =
  -fno-exceptions
  -D ESP32BASE_PROFILE=ESP32BASE_PROFILE_RUNTIME
  -D ESP32BASE_ENABLE_RECORD_STORE=1
  -D ESP32BASE_ENABLE_APP_EVENTS=1
  -D ESP32BASE_ENABLE_APP_EVENT_CONDITIONS=1
  -D ESP32BASE_LOG_LEVEL=ESP32BASE_LOG_INFO
  -D ESP32BASE_EB_FILELOG_DEFAULT_MODE=ESP32BASE_FILELOG_MODE_WARN
