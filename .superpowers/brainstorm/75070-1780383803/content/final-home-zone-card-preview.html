<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>灌溉首页水路卡片预览</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --surface:#ffffff;
      --soft:#f8fafc;
      --line:#d9e2ec;
      --line-soft:#e6edf5;
      --text:#0f172a;
      --muted:#64748b;
      --ok:#166534;
      --ok-soft:#f0fdf4;
      --warn:#9a3412;
      --warn-soft:#fff7ed;
      --danger:#991b1b;
      --danger-soft:#fef2f2;
      --accent:#0f766e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .app{max-width:1160px;margin:0 auto;padding:24px 18px 40px}
    header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}
    h1{font-size:26px;line-height:1.15;margin:0 0 5px}
    .subtitle{margin:0;color:var(--muted)}
    .switcher{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end}
    .switcher button{
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--text);
      border-radius:7px;
      min-height:34px;
      padding:0 11px;
      font-weight:650;
      cursor:pointer;
    }
    .switcher button.active{border-color:#2563eb;background:#eff6ff;color:#1d4ed8}
    .panel{
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--surface);
      padding:14px;
      margin-bottom:14px;
    }
    .panel-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .panel-title h2{font-size:17px;margin:0}
    .panel-title span{color:var(--muted);font-size:13px}
    .metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .metric{
      border:1px solid var(--line-soft);
      background:var(--soft);
      border-radius:8px;
      padding:10px 11px;
      min-height:64px;
    }
    .metric b{display:block;font-size:20px;line-height:1.05;margin-bottom:6px}
    .metric span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .weather-strip{display:grid;grid-template-columns:minmax(0,1.2fr) repeat(3,minmax(0,.7fr));gap:10px}
    .weather-now,.weather-day{border:1px solid var(--line-soft);background:var(--soft);border-radius:8px;padding:10px 11px;min-width:0}
    .weather-now .value{display:block;font-size:20px;line-height:1.05;margin-bottom:6px}
    .weather-now span,.weather-day span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .weather-day .day{display:block;font-size:15px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .zone-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .zone-row{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(260px,.85fr);gap:12px;align-items:stretch}
    .zone-card{
      min-width:0;
      border:1px solid var(--line);
      background:var(--surface);
      border-radius:8px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .zone-card.running{border-color:#fdba74;background:#fffaf5}
    .zone-card.error{border-color:#fca5a5;background:#fffafa}
    .plan-card{
      border:1px solid var(--line);
      background:var(--surface);
      border-radius:8px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }
    .plan-card h3{font-size:16px;margin:0}
    .plan-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
    .plan-summary div{border:1px solid var(--line-soft);background:var(--soft);border-radius:7px;padding:6px 7px;min-width:0}
    .plan-summary .value{display:block;font-size:15px;line-height:1.05;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-summary span{display:block;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-list{display:grid;gap:7px}
    .plan-item{display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--line-soft);padding-top:7px;min-width:0}
    .plan-item:first-child{border-top:0;padding-top:0}
    .plan-main{min-width:0}
    .plan-main .time{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-main em{display:block;color:var(--muted);font-size:12px;font-style:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:22px;
      border:1px solid var(--line);
      border-radius:7px;
      padding:0 7px;
      font-size:12px;
      font-weight:750;
      white-space:nowrap;
      align-self:flex-start;
    }
    .plan-status.done{border-color:#bbf7d0;background:var(--ok-soft);color:var(--ok)}
    .plan-status.running{border-color:#fed7aa;background:var(--warn-soft);color:var(--warn)}
    .plan-status.pending{border-color:#bfdbfe;background:#eff6ff;color:#1d4ed8}
    .plan-status.blocked{border-color:#fecaca;background:var(--danger-soft);color:var(--danger)}
    .plan-status.idle{color:var(--muted);background:var(--soft)}
    .zone-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;min-height:42px}
    .zone-name{font-size:18px;font-weight:750;line-height:1.15;margin-bottom:3px}
    .task-line{color:var(--muted);font-size:13px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:0 8px;
      border:1px solid var(--line);
      border-radius:7px;
      background:var(--surface);
      color:var(--muted);
      font-size:12px;
      font-weight:750;
      white-space:nowrap;
    }
    .tag.ok{border-color:#bbf7d0;background:var(--ok-soft);color:var(--ok)}
    .tag.warn{border-color:#fed7aa;background:var(--warn-soft);color:var(--warn)}
    .tag.danger{border-color:#fecaca;background:var(--danger-soft);color:var(--danger);cursor:pointer}
    .zone-metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .zone-metric{
      border:1px solid var(--line-soft);
      background:var(--soft);
      border-radius:8px;
      padding:8px 9px;
      min-height:58px;
      min-width:0;
    }
    .zone-metric b{display:block;font-size:18px;line-height:1.05;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .zone-metric span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chart-wrap{border:1px solid var(--line-soft);border-radius:8px;background:#fff;padding:8px 9px}
    .chart-head{display:flex;justify-content:space-between;gap:8px;margin-bottom:5px;color:var(--muted);font-size:12px}
    svg.chart{display:block;width:100%;height:124px;border-radius:6px;background:linear-gradient(#fff,#f8fafc)}
    .footer-row{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:34px}
    .runtime{color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:flex;gap:7px;justify-content:flex-end;flex:0 0 auto}
    .btn{
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--text);
      border-radius:7px;
      min-height:32px;
      padding:0 10px;
      font-weight:750;
    }
    .btn.ok{border-color:#86efac;background:var(--ok-soft);color:var(--ok)}
    .btn.danger{border-color:#fecaca;background:var(--danger-soft);color:var(--danger)}
    .stop-all{display:flex;justify-content:flex-end;margin-top:12px}
    .note{color:var(--muted);font-size:13px;margin:12px 0 0}
    @media(max-width:760px){
      .app{padding:18px 12px 32px}
      header{align-items:flex-start;flex-direction:column}
      .switcher{justify-content:flex-start}
      .metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .weather-strip{grid-template-columns:1fr}
      .zone-row{grid-template-columns:1fr}
      .zone-metrics{grid-template-columns:1fr}
      .plan-summary{grid-template-columns:1fr}
      .footer-row{align-items:stretch;flex-direction:column}
      .actions{justify-content:flex-start}
      svg.chart{height:118px}
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>灌溉总览</h1>
        <p class="subtitle">每个启用水路占一整行：左侧运行状态大卡，右侧今日计划小卡。</p>
      </div>
      <div class="switcher" aria-label="启用水路数量">
        <button data-count="1">1 路启用</button>
        <button data-count="2" class="active">2 路启用</button>
        <button data-count="3">3 路启用</button>
        <button data-count="4">4 路启用</button>
      </div>
    </header>

    <section class="panel">
      <div class="panel-title">
        <h2>关键指标</h2>
        <span id="summaryHint">默认启用第 1、2 路</span>
      </div>
      <div class="metric-grid">
        <div class="metric"><b id="safetyText">正常</b><span>系统状态</span></div>
        <div class="metric"><b id="runningText">1 / 2</b><span>正在浇水 / 启用水路</span></div>
        <div class="metric"><b id="planText">4</b><span>今日计划</span></div>
        <div class="metric"><b id="errorText">0</b><span>异常提醒</span></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>天气预报</h2>
        <span>仅展示，不自动改变浇水计划</span>
      </div>
      <div class="weather-strip">
        <div class="weather-now"><span class="value">24°C · 多云</span><span>未来 24 小时降雨概率 35%，风力 2 级</span></div>
        <div class="weather-day"><span class="day">今天</span><span>22-28°C</span><span>降雨 35%</span></div>
        <div class="weather-day"><span class="day">明天</span><span>21-27°C</span><span>降雨 70%</span></div>
        <div class="weather-day"><span class="day">后天</span><span>23-30°C</span><span>降雨 20%</span></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>水路状态</h2>
        <span>一行一个启用水路</span>
      </div>
      <div id="zoneGrid" class="zone-grid"></div>
      <div class="stop-all"><button id="stopAll" class="btn danger">全部停止</button></div>
      <p class="note">说明：这是静态预览。实现时会继续使用现有状态 API 和流速历史 API，按钮仍保留 POST 与二次确认。</p>
    </section>
  </main>

  <script>
    const zones = [
      {name:'前院草坪', state:'running', stateText:'浇水中', task:'计划浇水 · 07:30', remaining:'12分34秒', flow:'1.84', volume:'4.260', runtime:'已运行 7分26秒 / 目标 20分钟', action:'stop', plans:[{time:'07:30', duration:'20分钟', status:'运行中', note:'剩余 12分34秒'},{time:'18:00', duration:'10分钟', status:'未完成', note:'傍晚补水'}]},
      {name:'后院花坛', state:'idle', stateText:'待机', task:'无运行任务', remaining:'-', flow:'-', volume:'0.000', runtime:'最近 10 分钟无流速', action:'start', plans:[{time:'06:50', duration:'12分钟', status:'完成', note:'正常完成'},{time:'19:10', duration:'8分钟', status:'未完成', note:'晚间轻浇'}]},
      {name:'菜园滴灌', state:'error', stateText:'异常', task:'启动后未检测到水流', remaining:'-', flow:'-', volume:'0.000', runtime:'点击异常标签查看详情', action:'clear', plans:[{time:'08:20', duration:'20分钟', status:'未完成', note:'水路异常阻止'}]},
      {name:'果树区', state:'idle', stateText:'待机', task:'无运行任务', remaining:'-', flow:'-', volume:'0.000', runtime:'最近 10 分钟无流速', action:'start', plans:[]}
    ];

    function linePath(seed){
      const pts = seed === 1
        ? [[4,62],[42,58],[84,44],[126,38],[168,49],[210,30],[252,35],[296,24]]
        : [[4,58],[42,50],[84,55],[126,34],[168,40],[210,28],[252,33],[296,22]];
      return pts.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
    }

    function chart(zone, index){
      const grid = [0, 0.5, 1.0, 1.5, 2.0];
      const xTicks = ['-10','-8','-6','-4','-2','现在'];
      const gridLines = grid.map((v,i) => {
        const y = 96 - (v / 2.0) * 76;
        return '<line x1="42" y1="'+y.toFixed(1)+'" x2="348" y2="'+y.toFixed(1)+'" stroke="#e2e8f0" vector-effect="non-scaling-stroke"/><text x="35" y="'+(y+4).toFixed(1)+'" text-anchor="end" fill="#64748b" font-size="10">'+v.toFixed(v === 0 ? 0 : 1)+'</text>';
      }).join('');
      const xLabels = xTicks.map((label,i) => {
        const x = 42 + i * (306 / (xTicks.length - 1));
        return '<line x1="'+x.toFixed(1)+'" y1="96" x2="'+x.toFixed(1)+'" y2="100" stroke="#cbd5e1" vector-effect="non-scaling-stroke"/><text x="'+x.toFixed(1)+'" y="115" text-anchor="middle" fill="#64748b" font-size="10">'+label+'</text>';
      }).join('');
      const axes = gridLines + '<line x1="42" y1="20" x2="42" y2="96" stroke="#94a3b8" vector-effect="non-scaling-stroke"/><line x1="42" y1="96" x2="348" y2="96" stroke="#94a3b8" vector-effect="non-scaling-stroke"/>' + xLabels + '<text x="6" y="14" fill="#64748b" font-size="10">L/min</text><text x="330" y="115" fill="#64748b" font-size="10">分钟</text>';
      if(zone.state !== 'running'){
        return '<svg class="chart" viewBox="0 0 360 124" preserveAspectRatio="none" role="img" aria-label="近期流速图表">'+axes+'<line x1="42" y1="96" x2="348" y2="96" stroke="#cbd5e1" stroke-width="2" vector-effect="non-scaling-stroke"/><text x="195" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">无流速</text></svg>';
      }
      const points = [[42,88],[84,82],[126,58],[168,48],[210,64],[252,40],[306,46],[348,32]];
      const d = points.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
      return '<svg class="chart" viewBox="0 0 360 124" preserveAspectRatio="none" role="img" aria-label="近期流速图表">'+axes+'<path d="'+d+' L348 96 L42 96 Z" fill="#0f766e" opacity=".08"/><path d="'+d+'" fill="none" stroke="#0f766e" stroke-width="2.5" vector-effect="non-scaling-stroke"/><circle cx="348" cy="32" r="3.5" fill="#0f766e"/></svg>';
    }

    function actionHtml(zone){
      if(zone.action === 'stop') return '<button class="btn danger">停止</button>';
      if(zone.action === 'clear') return '<button class="btn danger">清除异常</button>';
      return '<button class="btn ok">启动</button>';
    }

    function planClass(status){
      if(status === '完成') return 'done';
      if(status === '运行中') return 'running';
      return 'pending';
    }

    function planCard(zone){
      const plans = zone.plans || [];
      if(!plans.length){
        return '<aside class="plan-card"><h3>今日计划</h3><div class="plan-summary"><div><span class="value">0 / 0</span><span>完成进度</span></div><div><span class="value">0 / 0分钟</span><span>已浇 / 总时长</span></div><div><span class="value">0分钟</span><span>剩余时长</span></div></div><div class="plan-list"><div class="plan-item"><div class="plan-main"><span class="time">无启用计划</span><em>这一路今天不会自动浇水</em></div><span class="plan-status idle">待机</span></div></div></aside>';
      }
      const totalMin = plans.reduce((sum,p)=>sum + (parseInt(p.duration,10) || 0), 0);
      const done = plans.filter(p => p.status === '完成').length;
      const doneMin = plans.reduce((sum,p)=>p.status === '完成' ? sum + (parseInt(p.duration,10) || 0) : sum, 0);
      const remainingMin = Math.max(0, totalMin - doneMin);
      return '<aside class="plan-card"><h3>今日计划</h3>'+
        '<div class="plan-summary"><div><span class="value">'+done+' / '+plans.length+'</span><span>完成进度</span></div><div><span class="value">'+doneMin+' / '+totalMin+'分钟</span><span>已浇 / 总时长</span></div><div><span class="value">'+remainingMin+'分钟</span><span>剩余时长</span></div></div>'+
        '<div class="plan-list">'+plans.map(p=>'<div class="plan-item"><div class="plan-main"><span class="time">'+p.time+' · '+p.duration+'</span><em>'+p.note+'</em></div><span class="plan-status '+planClass(p.status)+'">'+p.status+'</span></div>').join('')+'</div>'+
      '</aside>';
    }

    function statusCard(zone, index){
      const tone = zone.state === 'running' ? 'warn' : (zone.state === 'error' ? 'danger' : 'ok');
      return '<article class="zone-card '+zone.state+'">'+
        '<div class="zone-head"><div><div class="zone-name">'+zone.name+'</div><div class="task-line">'+zone.task+'</div></div><span class="tag '+tone+'">'+zone.stateText+'</span></div>'+
        '<div class="zone-metrics">'+
          '<div class="zone-metric"><b>'+zone.remaining+'</b><span>剩余时间</span></div>'+
          '<div class="zone-metric"><b>'+zone.flow+'</b><span>L/min 当前流速</span></div>'+
          '<div class="zone-metric"><b>'+zone.volume+'</b><span>L 估算水量</span></div>'+
        '</div>'+
        '<div class="chart-wrap"><div class="chart-head"><span>近期流速</span><span>最近 10 分钟</span></div>'+chart(zone,index)+'</div>'+
        '<div class="footer-row"><div class="runtime">'+zone.runtime+'</div><div class="actions">'+actionHtml(zone)+'</div></div>'+
      '</article>';
    }

    function zoneRow(zone, index){
      return '<div class="zone-row">'+statusCard(zone,index)+planCard(zone)+'</div>';
    }

    function render(count){
      const active = zones.slice(0,count);
      const grid = document.getElementById('zoneGrid');
      grid.className = 'zone-grid count-'+count;
      grid.innerHTML = active.map((z,i)=>zoneRow(z,i)).join('');
      const running = active.filter(z=>z.state==='running').length;
      const errors = active.filter(z=>z.state==='error').length;
      const totalPlans = active.reduce((sum,z)=>sum + ((z.plans && z.plans.length) || 0), 0);
      document.getElementById('safetyText').textContent = errors ? errors+' 路异常' : '正常';
      document.getElementById('runningText').textContent = running+' / '+count;
      document.getElementById('planText').textContent = String(totalPlans);
      document.getElementById('errorText').textContent = String(errors);
      document.getElementById('stopAll').disabled = running === 0;
      document.getElementById('summaryHint').textContent = count+' 个启用水路，'+count+' 行水路信息';
      document.querySelectorAll('.switcher button').forEach(b=>b.classList.toggle('active', Number(b.dataset.count)===count));
    }

    document.querySelectorAll('.switcher button').forEach(b=>b.addEventListener('click',()=>render(Number(b.dataset.count))));
    render(2);
  </script>
</body>
</html>
