  <main class="shell">
    <header class="page-head"><div><h1>近期计划</h1><p class="subtitle">显示今天、明天、后天的计划展开结果和触发结果。</p></div></header>
    <section class="grid"><div class="panel span-12"><div class="table-wrap"><table class="action-table"><thead><tr><th>日期</th><th>时间</th><th>计划</th><th>内容</th><th>状态</th><th>说明</th><th>操作</th></tr></thead><tbody><tr><td>今天 <span class="title-date">2026-05-28</span></td><td>07:00</td><td>第 1 路 / 计划 1</td><td>第 1 路 5 分钟</td><td><span class="badge ok">已启动</span></td><td>计划触发结果：已启动</td><td>-</td></tr><tr><td>今天 <span class="title-date">2026-05-28</span></td><td>20:00</td><td>第 2 路 / 计划 3</td><td>第 2 路 4 分钟</td><td><span class="badge">未开始</span></td><td>等待执行</td><td><button class="warn" onclick="return confirm('确认跳过本次计划？')">跳过本次</button></td></tr><tr><td>明天 <span class="title-date">2026-05-29</span></td><td>07:00</td><td>第 1 路 / 计划 2</td><td>第 1 路 3 分钟</td><td><span class="badge warn">已跳过</span></td><td>计划触发结果：已手动跳过</td><td><button class="secondary" onclick="return confirm('确认取消跳过？')">取消跳过</button></td></tr><tr><td>后天 <span class="title-date">2026-05-30</span></td><td>07:00</td><td>第 3 路 / 计划 1</td><td>当前无可执行水路</td><td><span class="badge warn">未执行</span></td><td>计划触发结果：水路停用跳过</td><td>-</td></tr></tbody></table></div></div></section>
  </main>
