[env:STC8H8K64U]
platform = intel_mcs51
board = STC8H8K64U
board_upload.maximum_size = 65535
build_flags =
    --stack-auto
    -I/Users/tyg/dir/codex_dir/Stc8hBase/core
    -I/Users/tyg/dir/codex_dir/Stc8hBase/hal
    -I/Users/tyg/dir/codex_dir/Stc8hBase/drivers
    -I/Users/tyg/dir/codex_dir/Stc8hBase/utils
    -Iboard
    -Isrc
    -DSTC8H_CONFIG_INCLUDE=\"board_config.h\"
    -DSTC8H_PINS_INCLUDE=\"board_pins.h\"
    -DSTC8H_UART1_PIN_GROUP=1
    -DSTC8H_UART_ENABLE_RX=1
    -DSTC8H_UART_ENABLE_WRITE_RAM=0
    -DSTC8H_UART_ENABLE_WRITE_CODE=0
    -DSTC8H_PWM_GROUP_MASK=0x03
    -DSTC8H_PWM_A_CHANNEL_MASK=0x0F
    -DSTC8H_PWM_B_CHANNEL_MASK=0x0F
    -DSTC8H_PWM_ENABLE_DISABLE=1
    -DUTIL_CRC16_MODBUS_ENABLE_XDATA=1
