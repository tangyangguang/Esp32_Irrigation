<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>总览 - 原型</title>
  <link rel="stylesheet" href="assets/prototype.css">
</head>
<body class="page-overview">
  <nav class="topnav">
    <a class="active" href="dashboard.html">总览</a>
    <a href="manual.html">手动</a>
    <a href="plans.html">近期计划</a>
    <a href="plan-config.html">计划配置</a>
    <a href="records.html">记录</a>
    <a href="settings.html">设置</a>
    <a href="status-api.html">调试</a>
  </nav>
  <main class="shell">
    <header class="page-head">
      <div>
        <h1>总览</h1>
        <p class="subtitle">只看系统状态、阀门状态和需要立即注意的信息。</p>
      </div>
    </header>

    <section class="grid">
      <div class="panel span-6">
        <h2>设备状态</h2>
        <div class="overview-status">
          <div><span>设备</span><strong><span class="badge ok">正常</span></strong></div>
          <div><span>当前</span><strong>空闲</strong></div>
          <div><span>WiFi</span><strong>IOTHOME</strong></div>
          <div><span>信号</span><strong>良好（-63 dBm）</strong></div>
        </div>
      </div>

      <div class="panel span-6">
        <h2>浇水状态</h2>
        <div class="overview-status status-compact">
          <div><span>当前浇水</span><strong>未运行</strong></div>
        </div>
        <div class="valve-matrix" role="table" aria-label="浇水状态">
          <div class="matrix-head" role="columnheader">项目</div>
          <div class="matrix-head" role="columnheader">第 1 路</div>
          <div class="matrix-head" role="columnheader">第 2 路</div>
          <div class="matrix-label" role="rowheader">状态</div>
          <strong>关闭</strong>
          <strong>未启用</strong>
          <div class="matrix-label" role="rowheader">目标</div>
          <strong>0 分钟</strong>
          <strong>-</strong>
          <div class="matrix-label" role="rowheader">剩余</div>
          <strong>0 分钟</strong>
          <strong>-</strong>
          <div class="matrix-label" role="rowheader">水量</div>
          <strong>0.000 L</strong>
          <strong>-</strong>
          <div class="matrix-label" role="rowheader">流速</div>
          <strong>0.00 L/min</strong>
          <strong>-</strong>
        </div>
        <div class="valve-action valve-action-row">
          <button class="danger" disabled>停止全部</button>
          <button class="danger" disabled>停止第 1 路</button>
          <button class="danger" disabled>停止第 2 路</button>
        </div>
      </div>

      <div class="panel span-6">
        <h2>异常</h2>
        <div class="notice">
          <strong><span class="badge ok">无当前异常</span></strong>
          <p class="note">存在异常时在这里显示原因和状态，历史事件在记录页查看。</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
