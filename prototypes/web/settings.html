<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设置 - 原型</title>
  <link rel="stylesheet" href="assets/prototype.css">
</head>
<body class="page-form page-settings">
  <nav class="topnav">
    <a href="dashboard.html">总览</a>
    <a href="manual.html">手动</a>
    <a href="plans.html">近期计划</a>
    <a href="plan-config.html">计划配置</a>
    <a href="records.html">记录</a>
    <a class="active" href="settings.html">设置</a>
  </nav>
  <main class="shell">
    <header class="page-head">
      <div>
        <h1>设置</h1>
        <p class="subtitle">查看当前灌溉参数，每次只修改一个参数。</p>
      </div>
    </header>

    <section class="grid">
      <div class="panel span-6">
        <h2>灌溉设置</h2>
        <div class="setting-list">
          <div class="setting-row">
            <span>已启用路数</span>
            <strong>1 路</strong>
            <em>由各路启用状态计算</em>
          </div>
          <div class="setting-row">
            <span>默认模式</span>
            <strong>同时浇水</strong>
            <button class="secondary">修改</button>
          </div>
        </div>
      </div>

      <div class="panel span-6">
        <h2>水流检测</h2>
        <div class="setting-list">
          <div class="setting-row">
            <span>无脉冲超时</span>
            <strong>10 秒</strong>
            <button class="secondary">修改</button>
          </div>
          <div class="setting-row">
            <span>漏水窗口</span>
            <strong>10 秒</strong>
            <button class="secondary">修改</button>
          </div>
          <div class="setting-row">
            <span>漏水脉冲阈值</span>
            <strong>3</strong>
            <button class="secondary">修改</button>
          </div>
        </div>
      </div>

      <div class="panel span-6">
        <h2>第 1 路配置</h2>
        <div class="setting-list">
          <div class="setting-row">
            <span>启用状态</span>
            <strong>已启用</strong>
            <button class="secondary">修改</button>
          </div>
          <div class="setting-row">
            <span>名称</span>
            <strong>Road 1</strong>
            <button class="secondary">修改</button>
          </div>
          <div class="setting-row">
            <span>默认时长</span>
            <strong>5 分钟</strong>
            <button class="secondary">修改</button>
          </div>
          <div class="setting-row">
            <span>每升脉冲</span>
            <strong>450 pulse/L</strong>
            <button class="secondary">修改</button>
          </div>
          <div class="setting-row">
            <span>校准系数</span>
            <strong>1000</strong>
            <button class="secondary">修改</button>
          </div>
        </div>
      </div>

      <div class="panel span-6">
        <h2>第 2 路配置</h2>
        <div class="setting-list">
          <div class="setting-row">
            <span>启用状态</span>
            <strong>未启用</strong>
            <button class="secondary">修改</button>
          </div>
          <div class="setting-row">
            <span>名称</span>
            <strong>Road 2</strong>
            <button class="secondary" disabled>修改</button>
          </div>
          <div class="setting-row">
            <span>默认时长</span>
            <strong>5 分钟</strong>
            <button class="secondary" disabled>修改</button>
          </div>
          <div class="setting-row">
            <span>每升脉冲</span>
            <strong>450 pulse/L</strong>
            <button class="secondary" disabled>修改</button>
          </div>
          <div class="setting-row">
            <span>校准系数</span>
            <strong>1000</strong>
            <button class="secondary" disabled>修改</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
