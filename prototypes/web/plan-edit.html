<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>编辑计划 - 原型</title>
  <link rel="stylesheet" href="assets/prototype.css">
</head>
<body>
  <nav class="topnav">
    <a href="dashboard.html">灌溉</a>
    <a href="status-api.html">状态 API</a>
    <a href="manual.html">手动</a>
    <a class="active" href="plans.html">计划</a>
    <a href="settings.html">配置</a>
    <a href="records.html">记录</a>
  </nav>
  <main class="shell">
    <header class="page-head">
      <div>
        <h1>编辑计划</h1>
        <p class="subtitle">独立页面编辑单个计划，保存、跳过今日、取消跳过都需要确认。</p>
      </div>
      <a class="button secondary" href="plans.html">返回计划列表</a>
    </header>

    <section class="grid">
      <div class="panel span-8">
        <h2>计划 1</h2>
        <div class="field-grid">
          <div class="field"><label>启用状态</label><select><option>停用</option><option>启用</option></select></div>
          <div class="field"><label>小时</label><input value="7" inputmode="numeric"></div>
          <div class="field"><label>分钟</label><input value="0" inputmode="numeric"></div>
          <div class="field"><label>第 1 路时长</label><input value="5" inputmode="decimal"></div>
          <div class="field"><label>第 2 路时长</label><input value="0" inputmode="decimal"></div>
          <div class="field"><label>执行模式</label><select><option>同时浇水</option><option>顺序浇水</option></select></div>
          <div class="field"><label>周期</label><select><option>每周</option><option>每隔 N 天</option></select></div>
          <div class="field"><label>每周掩码</label><input value="127" inputmode="numeric"></div>
          <div class="field"><label>间隔天数</label><input value="1" inputmode="numeric"></div>
          <div class="field"><label>跳过日期</label><input value="0" disabled></div>
        </div>
        <div class="actions">
          <button>保存计划</button>
          <button class="warn">跳过今日</button>
          <button class="secondary">取消跳过</button>
        </div>
      </div>
      <div class="panel span-4">
        <h2>后续优化</h2>
        <p class="note">当前固件使用每周掩码字段。后续可以把它优化成周一至周日复选框，但这属于下一轮页面和固件交互优化。</p>
      </div>
    </section>
  </main>
</body>
</html>
